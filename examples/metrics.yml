# Copy to .github/workflows/metrics.yml in a consuming repo.
name: Traceability metrics

on:
  schedule:
    - cron: "0 2 * * 1"   # weekly, Monday 02:00 UTC
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days to analyze"
        default: "30"

jobs:
  metrics:
    uses: royzah/traceability-helper/.github/workflows/metrics.yml@v1
    with:
      days_back: ${{ github.event.inputs.days_back || '30' }}
    secrets: inherit
